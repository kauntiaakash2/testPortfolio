<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Akash Agarwal — a fully 3D CSS3D/WebGL portfolio flying through a cyberpunk void." />
  <meta name="theme-color" content="#02050d" />
  <title>Akash Agarwal | 100% 3D Portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            space: ['Space Grotesk', 'sans-serif'],
            code: ['Fira Code', 'monospace']
          },
          colors: {
            void: '#02050d',
            acid: '#00ff9d',
            cyanx: '#56f7ff',
            plasma: '#a855f7'
          }
        }
      }
    };
  </script>

  <style>
    :root {
      --cyan: #56f7ff;
      --acid: #00ff9d;
      --purple: #a855f7;
      --pink: #ff4fd8;
      --ink: #effaff;
      --muted: rgba(239, 250, 255, 0.72);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; cursor: none; background: #02050d; }
    html { scroll-behavior: auto; }
    body {
      min-height: 900vh;
      overflow-x: hidden;
      color: var(--ink);
      font-family: 'Space Grotesk', system-ui, sans-serif;
    }
    a, button, [data-interactive] { cursor: none; }
    ::selection { background: var(--cyan); color: #031018; }

    #webgl, #css3d {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }
    #webgl { z-index: 1; display: block; }
    #css3d { z-index: 2; pointer-events: none; overflow: hidden; }
    #css3d > div { pointer-events: none; }

    .css3d-card {
      pointer-events: auto;
      width: min(920px, 88vw);
      min-height: 430px;
      transform-style: preserve-3d;
      user-select: text;
    }
    .css3d-card a, .css3d-card button { pointer-events: auto; }

    .holo-card {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(86, 247, 255, 0.34);
      background:
        radial-gradient(circle at 12% 0%, rgba(0, 255, 157, 0.16), transparent 24rem),
        radial-gradient(circle at 92% 20%, rgba(168, 85, 247, 0.20), transparent 25rem),
        linear-gradient(145deg, rgba(8, 19, 35, 0.78), rgba(3, 8, 18, 0.64));
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.05) inset,
        0 0 42px rgba(86, 247, 255, 0.16),
        0 24px 90px rgba(0, 0, 0, 0.58);
      backdrop-filter: blur(24px) saturate(145%);
    }
    .holo-card::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px) 0 0 / 44px 44px,
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px) 0 0 / 44px 44px;
      mask-image: radial-gradient(circle at 50% 45%, black, transparent 78%);
    }
    .holo-card::after {
      content: '';
      position: absolute;
      inset: -2px;
      pointer-events: none;
      background: linear-gradient(115deg, transparent 18%, rgba(86, 247, 255, .18) 38%, transparent 48%, rgba(255, 79, 216, .13) 70%, transparent 84%);
      mix-blend-mode: screen;
      opacity: .75;
      transform: translateX(-18%);
      animation: sheen 7s ease-in-out infinite;
    }
    @keyframes sheen {
      0%, 100% { transform: translateX(-26%); opacity: .35; }
      50% { transform: translateX(18%); opacity: .78; }
    }

    .chip {
      border: 1px solid rgba(86, 247, 255, .24);
      background: rgba(86, 247, 255, .07);
      box-shadow: 0 0 18px rgba(86, 247, 255, .08) inset;
    }
    .link-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      border: 1px solid rgba(86, 247, 255, .34);
      border-radius: 999px;
      padding: .78rem 1rem;
      color: var(--ink);
      text-decoration: none;
      background: linear-gradient(135deg, rgba(86,247,255,.12), rgba(168,85,247,.12));
      box-shadow: 0 0 22px rgba(86,247,255,.08), inset 0 1px 0 rgba(255,255,255,.12);
      transition: transform .2s ease, border-color .2s ease, background .2s ease, box-shadow .2s ease;
    }
    .link-button:hover, .link-button:focus-visible {
      transform: translateY(-3px) scale(1.02);
      border-color: rgba(0,255,157,.7);
      background: linear-gradient(135deg, rgba(0,255,157,.18), rgba(86,247,255,.14));
      box-shadow: 0 0 34px rgba(0,255,157,.18), inset 0 1px 0 rgba(255,255,255,.18);
      outline: none;
    }

    .hud {
      position: fixed;
      left: clamp(1rem, 3vw, 2rem);
      bottom: clamp(1rem, 3vw, 2rem);
      z-index: 3;
      pointer-events: none;
      font-family: 'Fira Code', monospace;
      color: rgba(239,250,255,.72);
      letter-spacing: .18em;
      text-transform: uppercase;
      font-size: .72rem;
      text-shadow: 0 0 14px rgba(86,247,255,.55);
    }
    .hud-line {
      width: min(340px, 60vw);
      height: 1px;
      margin-top: .75rem;
      background: rgba(255,255,255,.18);
      overflow: hidden;
    }
    #progress {
      display: block;
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--acid), var(--cyan), var(--purple));
      box-shadow: 0 0 20px var(--cyan);
    }

    #custom-cursor {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 9999;
      width: 18px;
      height: 18px;
      display: grid;
      place-items: center;
      pointer-events: none;
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 0 14px rgba(86, 247, 255, .95));
    }
    #custom-cursor .dot {
      width: 11px;
      height: 11px;
      border-radius: 999px;
      background: var(--cyan);
      box-shadow: 0 0 16px var(--cyan), 0 0 40px rgba(86,247,255,.7);
      transition: opacity .12s ease, transform .12s ease;
    }
    #custom-cursor svg {
      position: absolute;
      width: 54px;
      height: 54px;
      opacity: 0;
      transform: translate(12px, 10px) rotate(-12deg) scale(.55);
      transform-origin: 34% 16%;
      transition: opacity .12s ease, transform .12s ease;
    }
    #custom-cursor.is-pointer .dot { opacity: 0; transform: scale(.1); }
    #custom-cursor.is-pointer svg {
      opacity: 1;
      transform: translate(12px, 10px) rotate(-12deg) scale(1);
      animation: handPulse .72s ease-in-out infinite alternate;
    }
    @keyframes handPulse {
      from { filter: drop-shadow(0 0 10px rgba(86,247,255,.85)); }
      to { filter: drop-shadow(0 0 26px rgba(255,79,216,.95)); transform: translate(12px, 10px) rotate(-12deg) scale(1.08); }
    }

    .terminal-line::before { content: '$ '; color: var(--acid); }
    .scanline {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(180deg, rgba(255,255,255,.035) 0 1px, transparent 1px 7px);
      opacity: .32;
      mix-blend-mode: overlay;
    }

    @media (max-width: 760px) {
      body { min-height: 980vh; }
      .css3d-card { width: 92vw; min-height: 520px; }
    }
  </style>
</head>
<body>

  <script>
    (() => {
      if (!window.THREE || !THREE.CSS3DRenderer || !window.gsap || !window.ScrollTrigger) {
        document.body.insertAdjacentHTML('beforeend', '<p style="position:fixed;inset:auto 1rem 1rem auto;z-index:20;color:#effaff;font:14px Space Grotesk;background:#07111d;border:1px solid #56f7ff66;border-radius:16px;padding:12px 16px;">Renderer libraries failed to load. Please check the CDN connection.</p>');
        return;
      }

      gsap.registerPlugin(ScrollTrigger);

      const webglCanvas = document.getElementById('webgl');
      const cssRoot = document.getElementById('css3d');
      const progress = document.getElementById('progress');
      const chapter = document.getElementById('chapter');
      const cursor = document.getElementById('custom-cursor');
      const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      const scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x02050d, 0.000115);

      const cssScene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 1, 16000);
      camera.position.set(0, 0, 850);
      camera.lookAt(0, 0, 0);

      const renderer = new THREE.WebGLRenderer({ canvas: webglCanvas, antialias: true, alpha: false, powerPreference: 'high-performance' });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setClearColor(0x02050d, 1);
      renderer.outputEncoding = THREE.sRGBEncoding;

      const cssRenderer = new THREE.CSS3DRenderer();
      cssRenderer.setSize(window.innerWidth, window.innerHeight);
      cssRenderer.domElement.style.position = 'fixed';
      cssRenderer.domElement.style.inset = '0';
      cssRenderer.domElement.style.pointerEvents = 'none';
      cssRoot.appendChild(cssRenderer.domElement);

      scene.add(new THREE.AmbientLight(0x6177ff, 0.65));
      const cyanLight = new THREE.PointLight(0x56f7ff, 3.2, 5200);
      cyanLight.position.set(-800, 450, 400);
      scene.add(cyanLight);
      const purpleLight = new THREE.PointLight(0xa855f7, 2.8, 6200);
      purpleLight.position.set(1100, -220, -2200);
      scene.add(purpleLight);

      const makeParticleField = (count, radius, size, colorA, colorB) => {
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(count * 3);
        const colors = new Float32Array(count * 3);
        const colorOne = new THREE.Color(colorA);
        const colorTwo = new THREE.Color(colorB);
        const tempColor = new THREE.Color();

        for (let i = 0; i < count; i++) {
          const i3 = i * 3;
          const theta = Math.random() * Math.PI * 2;
          const phi = Math.acos((Math.random() * 2) - 1);
          const r = radius * (0.22 + Math.pow(Math.random(), 0.52) * 0.78);
          positions[i3] = Math.sin(phi) * Math.cos(theta) * r;
          positions[i3 + 1] = Math.sin(phi) * Math.sin(theta) * r * 0.72;
          positions[i3 + 2] = Math.cos(phi) * r - 3600;
          tempColor.copy(colorOne).lerp(colorTwo, Math.random());
          colors[i3] = tempColor.r;
          colors[i3 + 1] = tempColor.g;
          colors[i3 + 2] = tempColor.b;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        const material = new THREE.PointsMaterial({
          size,
          vertexColors: true,
          transparent: true,
          opacity: 0.92,
          depthWrite: false,
          blending: THREE.AdditiveBlending
        });
        return new THREE.Points(geometry, material);
      };

      const voidField = makeParticleField(9000, 8600, 11, 0x00ff9d, 0xa855f7);
      scene.add(voidField);
      const nearSparks = makeParticleField(1100, 3400, 18, 0x56f7ff, 0xff4fd8);

      scene.add(nearSparks);

      const tunnel = new THREE.Group();
      for (let i = 0; i < 44; i++) {

          transparent: true,
          opacity: 0.08,
          blending: THREE.AdditiveBlending
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.position.z = -i * 210;
        ring.rotation.z = i * 0.17;
        tunnel.add(ring);
      }

                  <a class="link-button" href="tel:+919060245158" target="_blank" rel="noreferrer"><i class="fa-solid fa-phone"></i> Phone</a>
                  <a class="link-button" href="https://www.linkedin.com/in/kauntiakash2/" target="_blank" rel="noreferrer"><i class="fa-brands fa-linkedin"></i> LinkedIn</a>
                  <a class="link-button" href="https://github.com/kauntiaakash2" target="_blank" rel="noreferrer"><i class="fa-brands fa-github"></i> GitHub</a>
                  <a class="link-button" href="https://www.codechef.com/users/kauntiakash2" target="_blank" rel="noreferrer"><i class="fa-solid fa-code"></i> CodeChef · 2 STAR · 1465</a>
                  <a class="link-button" href="https://codeforces.com/profile/kauntiaakash2" target="_blank" rel="noreferrer"><i class="fa-solid fa-terminal"></i> Codeforces · 915</a>
                </div>
              </div>
            </section>`
        }
      ];

      const cardObjects = [];
      sections.forEach((section) => {
        const holder = document.createElement('div');
        holder.innerHTML = section.html.trim();
        const element = holder.firstElementChild;
        const object = new THREE.CSS3DObject(element);
        object.position.set(section.x, section.y, section.z);
        object.rotation.y = section.rotY;
        cssScene.add(object);
        cardObjects.push(object);
      });

      const cameraState = { z: 850, x: 0, y: 0, rotZ: 0 };
      const pointer = { x: 0, y: 0 };
      const chapters = sections.map((section) => section.label);

      const updateCamera = () => {
        const parallaxX = pointer.x * 85;
        const parallaxY = pointer.y * 45;
        camera.position.set(cameraState.x + parallaxX, cameraState.y + parallaxY, cameraState.z);
        camera.rotation.z = cameraState.rotZ + pointer.x * -0.025;
        camera.lookAt(pointer.x * 120, pointer.y * 70, cameraState.z - 1200);
      };

      if (prefersReduced) {
        cameraState.z = -6820;
        chapter.textContent = chapters[chapters.length - 1];
        progress.style.width = '100%';
      } else {
        gsap.timeline({
          defaults: { ease: 'none' },
          scrollTrigger: {
            trigger: document.body,
            start: 'top top',
            end: 'bottom bottom',
            scrub: 1.05,
            onUpdate: (self) => {
              progress.style.width = `${self.progress * 100}%`;
              const idx = Math.min(chapters.length - 1, Math.floor(self.progress * chapters.length));
              chapter.textContent = chapters[idx];
            }
          }
        })
          .to(cameraState, { z: -680, x: 70, y: 16, rotZ: 0.015, duration: 1 })
          .to(cameraState, { z: -2180, x: -80, y: -10, rotZ: -0.016, duration: 1 })
          .to(cameraState, { z: -3680, x: 75, y: 12, rotZ: 0.012, duration: 1 })
          .to(cameraState, { z: -5180, x: -70, y: -6, rotZ: -0.012, duration: 1 })
          .to(cameraState, { z: -6680, x: 54, y: 10, rotZ: 0.01, duration: 1 })
          .to(cameraState, { z: -6900, x: 0, y: 0, rotZ: 0, duration: 0.55 });
      }

      window.addEventListener('mousemove', (event) => {
        pointer.x = (event.clientX / window.innerWidth - 0.5) * 2;
        pointer.y = -(event.clientY / window.innerHeight - 0.5) * 2;
      }, { passive: true });

      const cursorX = gsap.quickTo(cursor, 'x', { duration: 0.2, ease: 'power3.out' });
      const cursorY = gsap.quickTo(cursor, 'y', { duration: 0.2, ease: 'power3.out' });
      window.addEventListener('mousemove', (event) => {
        cursorX(event.clientX);
        cursorY(event.clientY);
      }, { passive: true });

      document.addEventListener('pointerover', (event) => {
        if (event.target.closest('a, button, [data-interactive]')) {
          cursor.classList.add('is-pointer');
          gsap.to(cursor, { scale: 1.05, duration: 0.14, overwrite: true });
        }
      });
      document.addEventListener('pointerout', (event) => {
        if (event.target.closest('a, button, [data-interactive]')) {
          cursor.classList.remove('is-pointer');
          gsap.to(cursor, { scale: 1, duration: 0.16, overwrite: true });
        }
      });

      const resize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        cssRenderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        ScrollTrigger.refresh();
      };
      window.addEventListener('resize', resize);

      const clock = new THREE.Clock();
      const render = () => {
        const elapsed = clock.getElapsedTime();
        voidField.rotation.y = elapsed * 0.018;
        voidField.rotation.x = Math.sin(elapsed * 0.11) * 0.04;
        nearSparks.rotation.y = -elapsed * 0.026;
        tunnel.rotation.z = elapsed * 0.018;
        tunnel.position.z = Math.sin(elapsed * 0.35) * 22;

        cardObjects.forEach((card, index) => {
          card.position.y = sections[index].y + Math.sin(elapsed * 0.8 + index) * 10;
          card.rotation.z = Math.sin(elapsed * 0.28 + index) * 0.006;
        });

        updateCamera();
        renderer.render(scene, camera);
        cssRenderer.render(cssScene, camera);
        requestAnimationFrame(render);
      };
      render();
    })();
  </script>
</body>
