<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Akash Agarwal - Playable 3D Portfolio</title>
  <style>
    html, body { margin:0; width:100%; height:100%; overflow:hidden; background:#070b16; font-family:Arial,sans-serif; }
    #ui {
      position:fixed; top:12px; left:12px; z-index:10; color:#dff;
      background:rgba(0,8,20,.72); border:1px solid #35f4ff88; border-radius:10px;
      padding:10px 12px; box-shadow:0 0 18px #35f4ff33;
    }
    #ui b { color:#35f4ff; }
  </style>
  <script async src="https://unpkg.com/es-module-shims@1.10.0/dist/es-module-shims.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
      "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
    }
  }
  </script>
</head>
<body>
  <div id="ui"><b>Use WASD / Arrow Keys</b> to Drive · Click neon pads to open links</div>

  <script type="module">
    import * as THREE from 'three';
    import * as CANNON from 'cannon-es';

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x070b16, 50, 260);

    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 500);
    camera.position.set(18, 20, 18);

    const renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0x7db3d1, 0.45));
    const dl = new THREE.DirectionalLight(0x9bd6ff, 1.2);
    dl.position.set(20, 30, 10);
    scene.add(dl);
    const glow = new THREE.PointLight(0xff4bf4, 1.8, 140);
    glow.position.set(0, 14, 0);
    scene.add(glow);

    const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -9.82, 0) });
    world.broadphase = new CANNON.SAPBroadphase(world);
    world.defaultContactMaterial.friction = 0.35;

    const floorSize = 240;
    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(floorSize, floorSize),
      new THREE.MeshStandardMaterial({ color:0x090f1e, roughness:.95, metalness:.05 })
    );
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);
    scene.add(new THREE.GridHelper(floorSize, 120, 0x35f4ff, 0x1d3a57));

    const groundBody = new CANNON.Body({ mass:0, shape:new CANNON.Plane() });
    groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
    world.addBody(groundBody);

    function textTexture({title='', lines=[]}) {
      const c = document.createElement('canvas'); c.width = 1024; c.height = 512;
      const x = c.getContext('2d');
      x.fillStyle = 'rgba(5,12,30,.85)'; x.fillRect(0,0,c.width,c.height);
      x.strokeStyle = '#35f4ff'; x.lineWidth = 8; x.strokeRect(8,8,c.width-16,c.height-16);
      x.fillStyle = '#35f4ff'; x.font = '700 56px Arial'; x.fillText(title, 40, 90);
      x.fillStyle = '#e8f8ff'; x.font = '500 34px Arial';
      let y = 150; for (const l of lines){ x.fillText(l, 40, y); y += 50; }
      const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; return t;
    }

    function billboard(x,z,title,lines){
      const m = new THREE.Mesh(
        new THREE.PlaneGeometry(13,6.5),
        new THREE.MeshBasicMaterial({ map:textTexture({title,lines}), side:THREE.DoubleSide })
      );
      m.position.set(x,4.2,z);
      m.lookAt(0,3,0);
      scene.add(m);
    }

    const interactives = [];
    function button(label, x, z, url, color=0x12dbff){
      const pad = new THREE.Mesh(
        new THREE.BoxGeometry(5,0.8,3.2),
        new THREE.MeshStandardMaterial({ color, emissive:color, emissiveIntensity:.35, metalness:.35, roughness:.4 })
      );
      pad.position.set(x,0.45,z);
      pad.userData.url = url;
      scene.add(pad);
      interactives.push(pad);

      const lbl = new THREE.Mesh(new THREE.PlaneGeometry(4.6,1.2), new THREE.MeshBasicMaterial({ map:textTexture({title:label, lines:[]}), transparent:true }));
      lbl.position.set(x,0.9,z); lbl.rotation.x = -Math.PI/2; lbl.userData.url = url; scene.add(lbl); interactives.push(lbl);
    }

    // Rover physics
    const chassisBody = new CANNON.Body({ mass: 180 });
    chassisBody.addShape(new CANNON.Box(new CANNON.Vec3(1.1,0.35,2.0)));
    chassisBody.position.set(0,1,0);
    chassisBody.angularDamping = 0.45;
    world.addBody(chassisBody);

    const vehicle = new CANNON.RaycastVehicle({ chassisBody, indexRightAxis:0, indexUpAxis:1, indexForwardAxis:2 });
    const wOpt = {
      radius: 0.44, directionLocal:new CANNON.Vec3(0,-1,0), axleLocal:new CANNON.Vec3(-1,0,0),
      suspensionStiffness: 40, suspensionRestLength: 0.35, frictionSlip: 5, dampingRelaxation: 2.3,
      dampingCompression: 4.4, maxSuspensionForce: 1e5, rollInfluence:0.01, maxSuspensionTravel:0.35
    };
    [[-1,0,1.4],[1,0,1.4],[-1,0,-1.4],[1,0,-1.4]].forEach(p=>{ wOpt.chassisConnectionPointLocal = new CANNON.Vec3(...p); vehicle.addWheel(wOpt); });
    vehicle.addToWorld(world);

    const rover = new THREE.Group(); scene.add(rover);
    rover.add(new THREE.Mesh(new THREE.BoxGeometry(2.4,.75,4.2), new THREE.MeshStandardMaterial({ color:0x13263b, metalness:.7, roughness:.3 })));
    const cab = new THREE.Mesh(new THREE.BoxGeometry(1.7,.6,1.8), new THREE.MeshStandardMaterial({ color:0x204666, emissive:0x1f5e86, emissiveIntensity:.3 }));
    cab.position.y = .65; cab.position.z = .2; rover.add(cab);
    const nose = new THREE.Mesh(new THREE.BoxGeometry(2,.3,.6), new THREE.MeshStandardMaterial({ color:0x35f4ff, emissive:0x35f4ff, emissiveIntensity:.75 }));
    nose.position.set(0,.15,2.2); rover.add(nose);
    const wheelMeshes=[];
    for(let i=0;i<4;i++){ const w = new THREE.Mesh(new THREE.CylinderGeometry(.47,.47,.36,16), new THREE.MeshStandardMaterial({ color:0x0a1018, emissive:0x35f4ff, emissiveIntensity:.25 })); w.rotation.z=Math.PI/2; scene.add(w); wheelMeshes.push(w); }

    // Obstacles
    const boxGeo = new THREE.BoxGeometry(2,2,2);
    for(let i=0;i<28;i++){
      const sx = THREE.MathUtils.randFloat(1.2,2.7), sy = THREE.MathUtils.randFloat(1.1,3), sz = THREE.MathUtils.randFloat(1.2,2.7);
      const mesh = new THREE.Mesh(boxGeo, new THREE.MeshStandardMaterial({ color:0x253b58, emissive:0x102038, emissiveIntensity:.25 }));
      mesh.scale.set(sx,sy,sz);
      const px = THREE.MathUtils.randFloatSpread(140), pz = THREE.MathUtils.randFloatSpread(140);
      mesh.position.set(px, sy/2, pz); scene.add(mesh);
      const body = new CANNON.Body({ mass: THREE.MathUtils.randFloat(15,40), shape:new CANNON.Box(new CANNON.Vec3(sx/2,sy/2,sz/2)) });
      body.position.set(px, sy/2, pz); body.mesh = mesh; world.addBody(body);
    }

    // Zones
    billboard(0,-12,'AKASH AGARWAL',[
      'B.Tech in AI & ML | ML Developer Intern @ Infiltrix',
      'Competitive Programmer',
      'Drive around to explore my profile.'
    ]);
    billboard(0,-62,'EXPERIENCE & ACHIEVEMENTS',[
      '• ML Dev Intern @ Infiltrix - latency -30%, accuracy +15%',
      '• SSoC Top 100 Contributor (4 merged PRs)',
      '• Tech Organizer for Code Kurukshetra @ KIIT FEST 9.0',
      '• Web Dev Domain @ AlgoZenith KIIT Chapter'
    ]);
    billboard(64,0,'FEATURED PROJECTS',[
      '• CodeFlowViz-2.0 - Interactive code visualization',
      '• FinVerify AI - React, FastAPI, Python, Scikit-learn'
    ]);
    button('Open CodeFlowViz App',58,8,'https://code-flow-viz-2-0-frontend.vercel.app/');
    button('Open CodeFlowViz GitHub',66,8,'https://github.com/kauntiaakash2/CodeFlowViz-2.0',0xff3df2);

    billboard(-64,0,'TECH STACK',['Python · C++ · React.js · Next.js · ML · FastAPI · MongoDB']);
    ['Python','C++','React.js','Next.js','Machine Learning','FastAPI','MongoDB'].forEach((s,i)=>{
      const a = i/7*Math.PI*2;
      const cube = new THREE.Mesh(new THREE.BoxGeometry(2.1,2.1,2.1), new THREE.MeshStandardMaterial({ color:0x1f3148, emissive:0x226f96, emissiveIntensity:.2 }));
      cube.position.set(-70+Math.cos(a)*8,2.2+(i%2)*.8,Math.sin(a)*8); scene.add(cube);
      const label = new THREE.Mesh(new THREE.PlaneGeometry(2.3,.7), new THREE.MeshBasicMaterial({ map:textTexture({title:s,lines:[]}), transparent:true, side:THREE.DoubleSide }));
      label.position.set(cube.position.x,cube.position.y+1.45,cube.position.z); label.lookAt(0,4,0); scene.add(label);
    });

    billboard(0,62,'INITIATE CONTACT',['Drive over or click pads to open links']);
    button('Email: akashkauntia2006@gmail.com',-15,74,'mailto:akashkauntia2006@gmail.com');
    button('LinkedIn',-5,79,'https://www.linkedin.com',0xff3df2);
    button('GitHub',5,74,'https://github.com/kauntiaakash2');
    button('CodeChef / Codeforces',15,79,'https://www.codechef.com',0xff3df2);

    const keys = { f:0, b:0, l:0, r:0, brake:0 };
    const map = { KeyW:'f',ArrowUp:'f',KeyS:'b',ArrowDown:'b',KeyA:'l',ArrowLeft:'l',KeyD:'r',ArrowRight:'r',Space:'brake' };
    addEventListener('keydown',e=>{ if(map[e.code]) keys[map[e.code]]=1; });
    addEventListener('keyup',e=>{ if(map[e.code]) keys[map[e.code]]=0; });

    function drive(){
      const force = keys.f ? -1700 : keys.b ? 1100 : 0;
      vehicle.applyEngineForce(force,2); vehicle.applyEngineForce(force,3);
      const steer = keys.l ? 0.5 : keys.r ? -0.5 : 0;
      vehicle.setSteeringValue(steer,0); vehicle.setSteeringValue(steer,1);
      const br = keys.brake ? 50 : 0; for(let i=0;i<4;i++) vehicle.setBrake(br,i);
    }

    const raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2();
    addEventListener('pointerdown',e=>{
      mouse.x = e.clientX/innerWidth*2-1; mouse.y = -(e.clientY/innerHeight)*2+1;
      raycaster.setFromCamera(mouse,camera);
      const hit = raycaster.intersectObjects(interactives)[0];
      if(hit?.object?.userData?.url) window.open(hit.object.userData.url,'_blank');
    });

    const camTarget = new THREE.Vector3();
    const clock = new THREE.Clock();
    let acc = 0, step = 1/60;
    function animate(){
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), .05);
      acc += dt;
      drive();
      while(acc >= step){ world.step(step); acc -= step; }

      rover.position.copy(chassisBody.position);
      rover.quaternion.copy(chassisBody.quaternion);
      for(let i=0;i<4;i++){ vehicle.updateWheelTransform(i); wheelMeshes[i].position.copy(vehicle.wheelInfos[i].worldTransform.position); wheelMeshes[i].quaternion.copy(vehicle.wheelInfos[i].worldTransform.quaternion); }
      world.bodies.forEach(b=>{ if(b.mesh){ b.mesh.position.copy(b.position); b.mesh.quaternion.copy(b.quaternion);} });

      for(const i of interactives){
        if(i.userData.url && rover.position.distanceTo(i.position) < 1.9 && !i.userData.cool){ i.userData.cool = 160; window.open(i.userData.url,'_blank'); }
        if(i.userData.cool) i.userData.cool--;
      }

      const forward = new THREE.Vector3(0,0,1).applyQuaternion(rover.quaternion).normalize();
      const right = new THREE.Vector3(1,0,0).applyQuaternion(rover.quaternion).normalize();
      camTarget.copy(rover.position);
      const desired = camTarget.clone().addScaledVector(forward,12).addScaledVector(right,12).add(new THREE.Vector3(0,15,0));
      camera.position.lerp(desired, 0.08);
      camera.lookAt(camTarget.x, camTarget.y+1.2, camTarget.z);

      renderer.render(scene,camera);
    }
    animate();

    addEventListener('resize',()=>{
      camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
